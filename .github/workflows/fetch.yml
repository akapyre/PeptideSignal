name: Fetch Peptide News

on:
  schedule:
    # Runs at 06:00 and 18:00 UTC every day — edit cron to taste
    - cron: "0 6,18 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fetcher
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python fetcher/fetch_news.py

      - name: Commit updated data
        run: |
          git config user.name "pyre-news-bot"
          git config user.email "actions@github.com"
          git add data/news.json
          git diff --quiet --cached || git commit -m "Auto-update peptide news ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
